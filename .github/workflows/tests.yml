name: tests
on:
- push
- workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.node-version'
    - uses: denoland/setup-deno@v2
      with:
        deno-version: v2.x
    - run: npm install
    - run: npm run build
    # - run: npm test
    - run: npm run test-lint
